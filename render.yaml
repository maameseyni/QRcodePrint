# Start Command dans le dashboard doit être identique à startCommand ci‑dessous (bind + $PORT).
# Runtime Python natif : PYTHON_VERSION, runtime.txt, .python-version (doc Render).
# Secrets : dashboard uniquement (pas sur GitHub).

services:
  - type: web
    name: qr-code-print
    runtime: python
    plan: free
    region: frankfurt
    # Ne pas faire « upgrade setuptools » sans borne : la 82+ supprime pkg_resources (python-escpos).
    buildCommand: pip install --upgrade pip wheel && pip install "setuptools>=69.0.0,<82" && pip install -r requirements.txt
    preDeployCommand: python scripts/render_init.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 app:app
    healthCheckPath: /login
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
