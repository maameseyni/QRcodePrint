# Runtime Python natif (pas Docker). Render lit PYTHON_VERSION et/ou .python-version à la racine.
# Doc : https://render.com/docs/python-version
# Secrets : dashboard Render uniquement (pas sur GitHub).

services:
  - type: web
    name: qr-code-print
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    preDeployCommand: python scripts/render_init.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 app:app
    healthCheckPath: /login
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
