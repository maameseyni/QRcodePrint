# Runtime Python natif (pas Docker). Forcer 3.12 côté Render : Environment → PYTHON_VERSION = 3.12.8
# + fichier runtime.txt / .python-version à la racine du repo.
# Secrets : dashboard Render uniquement (pas sur GitHub).

services:
  - type: web
    name: qr-code-print
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    preDeployCommand: python scripts/render_init.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 app:app
    healthCheckPath: /login
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
