<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Compléter le profil - QR Code Print</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <main class="login-page-shell">
        <section class="neumo-card">
            <h1 class="neumo-title">Compléter le profil</h1>
            <p class="neumo-subtitle">Ces informations sont nécessaires pour activer le compte structure.</p>
            {% if error %}
            <div class="alert alert-danger py-2 small" role="alert">{{ error }}</div>
            {% endif %}
            <form method="post" action="{{ url_for('complete_profile') }}" class="neumo-form neumo-complete-profile-form text-start">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Nom de la structure</label>
                        <div class="neumo-input-wrap">
                            <i class="bi bi-building neumo-input-icon" aria-hidden="true"></i>
                            <input type="text" class="form-control neumo-input" name="gym_name" value="{{ user.get('gym_name','') }}" placeholder="Nom de la structure" required autocomplete="organization">
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="neumo-input-wrap">
                            <div class="input-group flex-grow-1">
                                <span class="input-group-text phone-sn-prefix" id="completePhonePrefix">
                                    <i class="bi bi-telephone phone-sn-inline-icon" aria-hidden="true"></i>
                                    <span class="phone-sn-cc">+221</span>
                                </span>
                                <input type="tel" class="form-control neumo-input border-start-0" id="complete_phone_local"
                                       maxlength="9" minlength="9" inputmode="numeric" pattern="[0-9]{9}"
                                       value="{{ (user.get('phone') or '')|sn_phone_local }}" placeholder="Téléphone" required autocomplete="tel-national"
                                       aria-label="Téléphone"
                                       aria-describedby="completePhonePrefix">
                            </div>
                        </div>
                        <input type="hidden" name="phone" id="complete_phone_hidden" value="">
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="neumo-input-wrap">
                            <div class="input-group flex-grow-1">
                                <span class="input-group-text phone-sn-prefix" id="completeSecPrefix">
                                    <i class="bi bi-telephone-plus phone-sn-inline-icon" aria-hidden="true"></i>
                                    <span class="phone-sn-cc">+221</span>
                                </span>
                                <input type="tel" class="form-control neumo-input border-start-0" id="complete_secondary_local"
                                       maxlength="9" inputmode="numeric" pattern="[0-9]{9}"
                                       value="{{ (user.get('secondary_phone') or '')|sn_phone_local }}" placeholder="2e numéro (optionnel)" autocomplete="tel-national"
                                       aria-label="Deuxième numéro (optionnel)"
                                       aria-describedby="completeSecPrefix">
                            </div>
                        </div>
                        <input type="hidden" name="secondary_phone" id="complete_secondary_hidden" value="">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Adresse</label>
                        <div class="neumo-input-wrap">
                            <i class="bi bi-geo-alt neumo-input-icon" aria-hidden="true"></i>
                            <input type="text" class="form-control neumo-input" name="address" value="{{ user.get('address','') }}" placeholder="Adresse complète" required autocomplete="street-address">
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn neumo-btn neumo-complete-profile-submit w-100">Enregistrer</button>
            </form>
        </section>
    </main>
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Fermer"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/senegal-phone.js') }}"></script>
</body>
</html>
