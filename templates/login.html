<!DOCTYPE html>
<html lang="fr" class="login-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Connexion - QR Code Print</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <main class="login-page-shell">
        <section class="neumo-card">
            <div class="neumo-avatar">
                <i class="bi bi-person"></i>
            </div>
            <h1 class="neumo-title">Bienvenue</h1>
            <p class="neumo-subtitle">Veuillez vous connecter pour continuer</p>

            {% if error %}
            <div class="alert alert-danger py-2 small" role="alert">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="alert alert-success py-2 small" role="alert">{{ success }}</div>
            {% endif %}

            <ul class="nav neumo-tabs mb-2" id="authTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link {% if active_tab != 'signup' %}active{% endif %}" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-pane" type="button" role="tab">Connexion</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link {% if active_tab == 'signup' %}active{% endif %}" id="signup-tab" data-bs-toggle="pill" data-bs-target="#signup-pane" type="button" role="tab">Inscription</button>
                </li>
            </ul>

            <div class="tab-content" id="authTabsContent">
                <div class="tab-pane fade {% if active_tab != 'signup' %}show active{% endif %}" id="login-pane" role="tabpanel">
                    <form method="post" action="{{ url_for('login') }}" class="neumo-form">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="hidden" name="next" value="{{ next_url }}">
                        <input type="hidden" name="action" value="login">

                        <div class="neumo-input-wrap mb-3">
                            <i class="bi bi-envelope neumo-input-icon"></i>
                            <input type="text" class="form-control neumo-input" id="username" name="username" placeholder="Identifiant" required autocomplete="username" autofocus>
                        </div>
                        <div class="neumo-input-wrap mb-3">
                            <i class="bi bi-lock neumo-input-icon"></i>
                            <input type="password" class="form-control neumo-input" id="password" name="password" placeholder="Mot de passe" required autocomplete="current-password">
                            <button type="button" class="neumo-eye-btn" data-target="password" title="Afficher/masquer">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>

                        <div class="neumo-row mb-3">
                            <label class="form-check-label neumo-check">
                                <input class="form-check-input me-1" type="checkbox"> Se souvenir de moi
                            </label>
                            <a href="#" class="neumo-link">Mot de passe oublié ?</a>
                        </div>

                        <button type="submit" class="btn neumo-btn neumo-submit-btn w-100">Se connecter</button>
                    </form>

                    <div class="neumo-divider">OU CONTINUER AVEC</div>
                    <div class="neumo-socials">
                        <a href="{{ url_for('auth_google', next=next_url) }}" class="neumo-social-btn neumo-google-btn text-decoration-none d-inline-flex align-items-center justify-content-center" title="Continuer avec Google">
                            <svg class="google-logo me-2" width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
                                <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.652 32.657 29.201 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.274 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.651-.389-3.917z"/>
                                <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 18.961 13 24 13c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.274 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                                <path fill="#4CAF50" d="M24 44c5.171 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.143 35.091 26.715 36 24 36c-5.18 0-9.617-3.318-11.283-7.946l-6.52 5.025C9.513 39.556 16.227 44 24 44z"/>
                                <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.793 2.491-2.404 4.605-4.495 6.07l.003-.002 6.19 5.238C36.563 39.657 44 34 44 24c0-1.341-.138-2.651-.389-3.917z"/>
                            </svg>
                            <span>Google</span>
                        </a>
                    </div>
                </div>

                <div class="tab-pane fade {% if active_tab == 'signup' %}show active{% endif %}" id="signup-pane" role="tabpanel">
                    <form method="post" action="{{ url_for('login') }}" class="neumo-form neumo-signup-form">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="hidden" name="action" value="register">
                        <div class="row g-3">
                            <div class="col-6">
                                <div class="neumo-input-wrap">
                                    <i class="bi bi-building neumo-input-icon"></i>
                                    <input type="text" class="form-control neumo-input" id="gym_name" name="gym_name" placeholder="Nom de la structure" required>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="neumo-input-wrap">
                                    <i class="bi bi-envelope neumo-input-icon"></i>
                                    <input type="email" class="form-control neumo-input" id="email" name="email" placeholder="Email (optionnel)">
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="neumo-input-wrap">
                                    <div class="input-group flex-grow-1">
                                        <span class="input-group-text phone-sn-prefix" id="signupPhonePrefix">
                                            <i class="bi bi-telephone phone-sn-inline-icon" aria-hidden="true"></i>
                                            <span class="phone-sn-cc">+221</span>
                                        </span>
                                        <input type="tel" class="form-control neumo-input border-start-0" id="signup_phone_local"
                                               maxlength="9" minlength="9" inputmode="numeric" pattern="[0-9]{9}"
                                               placeholder="Téléphone" required autocomplete="tel-national"
                                               aria-label="Téléphone"
                                               aria-describedby="signupPhonePrefix">
                                    </div>
                                </div>
                                <input type="hidden" name="phone" id="signup_phone_hidden" value="">
                            </div>
                            <div class="col-6">
                                <div class="neumo-input-wrap">
                                    <div class="input-group flex-grow-1">
                                        <span class="input-group-text phone-sn-prefix" id="signupSecPrefix">
                                            <i class="bi bi-telephone-plus phone-sn-inline-icon" aria-hidden="true"></i>
                                            <span class="phone-sn-cc">+221</span>
                                        </span>
                                        <input type="tel" class="form-control neumo-input border-start-0" id="signup_secondary_phone_local"
                                               maxlength="9" inputmode="numeric" pattern="[0-9]{9}"
                                               placeholder="2e numéro (optionnel)" autocomplete="tel-national"
                                               aria-label="Deuxième numéro (optionnel)"
                                               aria-describedby="signupSecPrefix">
                                    </div>
                                </div>
                                <input type="hidden" name="secondary_phone" id="signup_secondary_phone_hidden" value="">
                            </div>
                            <div class="col-6">
                                <div class="neumo-input-wrap">
                                    <i class="bi bi-person-badge neumo-input-icon"></i>
                                    <input type="text" class="form-control neumo-input" id="signup_username" name="username" placeholder="Identifiant de connexion" required>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="neumo-input-wrap">
                                    <i class="bi bi-geo-alt neumo-input-icon"></i>
                                    <input type="text" class="form-control neumo-input" id="address" name="address" placeholder="Adresse" required>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="neumo-input-wrap">
                                    <i class="bi bi-lock neumo-input-icon"></i>
                                    <input type="password" class="form-control neumo-input" id="signup_password" name="password" placeholder="Mot de passe" minlength="8" required>
                                    <button type="button" class="neumo-eye-btn" data-target="signup_password" title="Afficher/masquer">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="neumo-input-wrap">
                                    <i class="bi bi-shield-lock neumo-input-icon"></i>
                                    <input type="password" class="form-control neumo-input" id="password_confirm" name="password_confirm" placeholder="Confirmer" minlength="8" required>
                                    <button type="button" class="neumo-eye-btn" data-target="password_confirm" title="Afficher/masquer">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn neumo-btn neumo-submit-btn w-100 mt-3">Créer mon compte</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Fermer"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/senegal-phone.js') }}"></script>
    <script>
        document.querySelectorAll('.neumo-eye-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const targetId = btn.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (!input) return;
                const icon = btn.querySelector('i');
                const show = input.type === 'password';
                input.type = show ? 'text' : 'password';
                if (icon) {
                    icon.classList.toggle('bi-eye', !show);
                    icon.classList.toggle('bi-eye-slash', show);
                }
            });
        });
    </script>
</body>
</html>
