<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>QR Code Print - Impression Thermique</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white custom-navbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-qr-code-scan"></i> QR Code Print
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item ms-3">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-printer me-2 disconnected" id="printerIcon"></i>
                            <div class="printer-status-text">
                                <strong>Imprimante:</strong>
                                <span id="printerStatus">Vérification...</span>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-4">
            <!-- Colonne gauche : Formulaire -->
            <div class="col-lg-6">
                <div class="card shadow-lg h-100">
                    <div class="card-header bg-primary text-white">
                        <h3 class="card-title mb-0">
                            <i class="bi bi-pencil-square"></i> Créer un QR Code
                        </h3>
                    </div>
                    <div class="card-body">
                        <form id="qrForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="client_name" class="form-label">
                                        Nom <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" id="client_name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="client_firstname" class="form-label">Prénom</label>
                                    <input type="text" class="form-control" id="client_firstname">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="client_phone" class="form-label">Téléphone</label>
                                    <input type="tel" class="form-control" id="client_phone">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="client_email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="client_email">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="client_id" class="form-label">Identifiant interne</label>
                                    <input type="text" class="form-control" id="client_id">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="ticket_number" class="form-label">Numéro de ticket</label>
                                    <input type="text" class="form-control" id="ticket_number">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="service" class="form-label">Service</label>
                                <input type="text" class="form-control" id="service" placeholder="Ex: Réparation, Maintenance...">
                            </div>

                            <div class="mb-3">
                                <label for="comment" class="form-label">Commentaire</label>
                                <textarea class="form-control" id="comment" rows="2"></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Durée d'expiration</label>
                                <div class="row">
                                    <div class="col-md-6">
                                        <select class="form-select" id="expiration" name="expiration">
                                            <option value="24h" selected>24 heures</option>
                                            <option value="7j">7 jours</option>
                                            <option value="30j">30 jours</option>
                                            <option value="custom">Personnalisé</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6" id="custom_hours_container" style="display: none;">
                                        <input type="number" class="form-control" id="custom_hours" 
                                               placeholder="Nombre d'heures" min="1" max="8760">
                                    </div>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg" id="generateBtn">
                                    <i class="bi bi-magic"></i> Générer le QR Code
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Colonne droite : QR Code -->
            <div class="col-lg-6">
                <div class="card shadow-lg qr-display-card h-100">
                    <div class="card-header bg-primary text-white">
                        <h3 class="card-title mb-0">
                            <i class="bi bi-qr-code-scan"></i> QR Code
                        </h3>
                    </div>
                    <div class="card-body d-flex flex-column align-items-center justify-content-center" id="qrDisplayCard">
                        <!-- État initial : Message d'attente -->
                        <div id="qrEmptyState" class="text-center">
                            <i class="bi bi-qr-code-scan" style="font-size: 5rem; color: #e9ecef; margin-bottom: 1.5rem;"></i>
                            <h5 class="text-muted mb-2">Aucun QR Code généré</h5>
                            <p class="text-muted small">Remplissez le formulaire à gauche<br>et cliquez sur "Générer le QR Code"</p>
                        </div>
                        
                        <!-- État avec QR Code -->
                        <div id="qrResult" style="display: none; width: 100%;">
                            <div class="text-center mb-3">
                                <h5 class="mb-2">QR Code généré</h5>
                                <p class="text-muted small mb-0" id="expirationText"></p>
                            </div>
                            
                            <div class="text-center mb-4">
                                <div id="qrImageContainer" class="qr-display">
                                    <!-- L'image QR sera injectée ici -->
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="button" class="btn btn-success btn-lg" id="printBtn">
                                    <i class="bi bi-printer"></i> Imprimer maintenant
                                </button>
                                <button type="button" class="btn btn-outline-primary" id="downloadBtn">
                                    <i class="bi bi-download"></i> Télécharger
                                </button>
                                <button type="button" class="btn btn-outline-secondary btn-sm" id="resetBtn">
                                    <i class="bi bi-arrow-repeat"></i> Générer un nouveau
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast pour notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
